{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; color: var(--secondary);">{{ translate('signup') }}</h2>
    <form method="POST">
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
                <label>{{ translate('first_name') }}</label>
                <input type="text" name="first_name" required>
            </div>
            <div>
                <label>{{ translate('last_name') }}</label>
                <input type="text" name="last_name" required>
            </div>
        </div>
        <div class="form-group">
            <label>{{ translate('username') }}</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>{{ translate('email') }}</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>{{ translate('phone') }}</label>
            <input type="text" name="phone" required placeholder="{{ translate('phone_placeholder') }}">
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" name="has_whatsapp" style="width: auto;">
            <label style="margin: 0;">{{ translate('has_whatsapp') }}</label>
        </div>
        <div class="form-group">
            <label>{{ translate('password') }}</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">{{ translate('create_account') }}</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem;">
        {{ translate('already_account') }} <a href="{{ url_for('auth.login') }}" style="color: var(--secondary);">{{
            translate('login_here') }}</a>
    </p>
</div>
{% endblock %}
