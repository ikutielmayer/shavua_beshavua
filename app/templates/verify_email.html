{% extends "base.html" %}

{% block content %}
<div class="form-container" style="max-width: 500px;">
    <h2 style="text-align: center; color: var(--secondary);">{{ translate('verify_title') }}</h2>
    <p style="text-align: center; margin-bottom: 2rem; opacity: 0.9;">
        {{ translate('verify_instr') }} <strong>{{ email }}</strong>. {{ translate('enter_code') }}.
    </p>

    <form method="POST">
        <div class="form-group">
            <input type="text" name="code" maxlength="6"
                style="text-align: center; font-size: 2rem; letter-spacing: 10px; font-weight: 800;"
                placeholder="000000" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">{{ translate('verify_btn')
            }}</button>
    </form>

    <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; opacity: 0.7;">
        {{ translate('no_account') }} <a href="{{ url_for('auth.signup') }}" style="color: var(--secondary);">{{
            translate('register_link') }}</a>
    </div>
</div>
{% endblock %}
