{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; color: var(--secondary);">Nueva Parashá</h2>
    <form method="POST">
        <div class="form-group">
            <label>Nombre (ES)</label>
            <input type="text" name="name_es" required>
        </div>
        <div class="form-group">
            <label>Nombre (EN)</label>
            <input type="text" name="name_en" required>
        </div>
        <div class="form-group">
            <label>Nombre (HE)</label>
            <input type="text" name="name_he" required>
        </div>
        <div class="form-group">
            <label>Fecha Inicio</label>
            <input type="date" name="start_date" required>
        </div>
        <div class="form-group">
            <label>Fecha Fin</label>
            <input type="date" name="end_date" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Crear Parashá</button>
    </form>
</div>
{% endblock %}
