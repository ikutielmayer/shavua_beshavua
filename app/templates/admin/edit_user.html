{% extends "base.html" %}

{% block content %}
<div class="form-container" style="max-width: 600px;">
    <h2 style="color: var(--secondary); text-align: center;">Editar Usuario: {{ user.username }}</h2>

    <form method="POST">
        <div class="form-group">
            <label>Nombre de Usuario</label>
            <input type="text" name="username" value="{{ user.username }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email }}" required>
        </div>
        <div class="form-group" style="display: flex; gap: 1rem;">
            <div style="flex: 1;">
                <label>Nombre</label>
                <input type="text" name="first_name" value="{{ user.first_name or '' }}">
            </div>
            <div style="flex: 1;">
                <label>Apellido</label>
                <input type="text" name="last_name" value="{{ user.last_name or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Rol</label>
            <select name="role">
                <option value="participant" {{ 'selected' if user.role=='participant' else '' }}>Participante</option>
                <option value="admin" {{ 'selected' if user.role=='admin' else '' }}>Administrador</option>
            </select>
        </div>
        <div class="form-group">
            <label>Puntos Tenedos</label>
            <input type="number" name="points" value="{{ user.points or 0 }}">
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="flex: 2;">Guardar Cambios</button>
            <a href="{{ url_for('admin.dashboard') }}" class="btn"
                style="flex: 1; background: rgba(255,255,255,0.1); text-align: center;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
