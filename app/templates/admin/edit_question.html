{% extends "base.html" %}

{% block content %}
<div class="form-container" style="max-width: 800px;">
    <h2 style="text-align: center; color: var(--secondary);">Editar Pregunta</h2>
    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label>Pregunta (ES)</label>
                <textarea name="text_es" required>{{ q.text_es }}</textarea>
            </div>
            <div class="form-group">
                <label>Pregunta (EN)</label>
                <textarea name="text_en">{{ q.text_en or '' }}</textarea>
            </div>
            <div class="form-group">
                <label>Pregunta (HE)</label>
                <textarea name="text_he" dir="rtl">{{ q.text_he or '' }}</textarea>
            </div>
        </div>

        <h3>Opciones</h3>
        <div style="display: grid; grid-template-columns: 50px 1fr 1fr 1fr; gap: 1rem; align-items: center;">
            <div style="text-align: center;"><strong>A</strong></div>
            <input type="text" name="a_es" placeholder="ES" value="{{ q.option_a_es }}" required>
            <input type="text" name="a_en" placeholder="EN" value="{{ q.option_a_en or '' }}">
            <input type="text" name="a_he" placeholder="HE" dir="rtl" value="{{ q.option_a_he or '' }}">

            <div style="text-align: center;"><strong>B</strong></div>
            <input type="text" name="b_es" placeholder="ES" value="{{ q.option_b_es }}" required>
            <input type="text" name="b_en" placeholder="EN" value="{{ q.option_b_en or '' }}">
            <input type="text" name="b_he" placeholder="HE" dir="rtl" value="{{ q.option_b_he or '' }}">

            <div style="text-align: center;"><strong>C</strong></div>
            <input type="text" name="c_es" placeholder="ES" value="{{ q.option_c_es }}" required>
            <input type="text" name="c_en" placeholder="EN" value="{{ q.option_c_en or '' }}">
            <input type="text" name="c_he" placeholder="HE" dir="rtl" value="{{ q.option_c_he or '' }}">
        </div>

        <div class="form-group" style="margin-top: 2rem;">
            <label>Opción Correcta</label>
            <select name="correct" required>
                <option value="a" {{ 'selected' if q.correct_option=='a' }}>A</option>
                <option value="b" {{ 'selected' if q.correct_option=='b' }}>B</option>
                <option value="c" {{ 'selected' if q.correct_option=='c' }}>C</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Guardar Cambios</button>
        <div style="text-align: center; margin-top: 1rem;">
            <a href="{{ url_for('admin.manage_questions', parasha_id=q.parasha_id) }}"
                style="color: var(--secondary);">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
